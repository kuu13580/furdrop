#:schema node_modules/wrangler/config-schema.json
name = "furdrop-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[[d1_databases]]
binding = "DB"
database_name = "furdrop"
database_id = "{{D1_DATABASE_ID}}"

[[r2_buckets]]
binding = "R2_ORIGINALS"
bucket_name = "furdrop-originals"

[[r2_buckets]]
binding = "R2_THUMBS"
bucket_name = "furdrop-thumbs"

[vars]
ENVIRONMENT = "production"
FIREBASE_PROJECT_ID = ""
R2_BUCKET_ORIGINALS = "furdrop-originals"
R2_BUCKET_THUMBS = "furdrop-thumbs"

# R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT は
# wrangler secret put または .dev.vars で設定

# Cronトリガー（クリーンアップジョブ）
# [[triggers]]
# crons = ["0 * * * *"]
