#:schema node_modules/wrangler/config-schema.json
name = "furdrop-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[[d1_databases]]
binding = "DB"
database_name = "furdrop"
database_id = "{{D1_DATABASE_ID}}"

