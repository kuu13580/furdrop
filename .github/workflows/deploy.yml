name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-workers:
    name: Workers デプロイ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: wrangler.toml 生成
        run: pnpm generate:wrangler
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}

      # D1マイグレーション（デプロイ前に実行）
      # wrangler d1 migrations applyはCIで自動実行される（確認プロンプトなし）
      # - name: D1 マイグレーション
      #   run: pnpm --filter workers migrate:prod
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Workers デプロイ
        run: pnpm --filter workers exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-pages:
    name: Pages デプロイ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: ビルド
        run: pnpm --filter frontend build

      - name: Pages デプロイ
        run: pnpm --filter workers exec wrangler pages deploy frontend/dist --project-name=furdrop
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
